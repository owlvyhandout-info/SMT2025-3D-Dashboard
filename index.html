<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ท้าทายเด็ก GIFTED แบบทดสอบ จุฬาภรณ์ SMT2025 สไตล์ 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: #e0e5ec; /* สีพื้นหลังโทนสว่างสบายตา */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* กล่อง Dashboard สไตล์ 3D เสมือนแท่นวางโมเดล */
        .dashboard-container {
            background: #e0e5ec;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 
                20px 20px 60px #bec3c9, 
                -20px -20px 60px #ffffff;
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        /* ส่วนจัดแสดงรูปภาพแบนเนอร์และโลโก้ */
        .image-gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
            align-items: center;
        }

        .image-gallery img {
            max-width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .image-gallery img:hover {
            transform: scale(1.02); /* เอฟเฟกต์ซูมเบาๆ เมื่อเอาเมาส์ชี้ */
        }

        .logo-img {
            max-width: 300px !important;
            background-color: white;
            padding: 10px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 2.2em;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* การจัดการปุ่ม */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        /* สไตล์ปุ่ม 3D สีสันสดใส */
        .btn-3d {
            display: block;
            width: 80%;
            max-width: 400px;
            padding: 18px 20px;
            font-size: 1.3em;
            font-weight: 600;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            position: relative;
            top: 0;
            transition: all 0.1s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* ปุ่มที่ 1: สีชมพูอมแดง */
        .btn-1 { 
            background-color: #ff6b6b; 
            box-shadow: 0 10px 0 #c0392b; 
        }
        .btn-1:active { 
            top: 10px; 
            box-shadow: 0 0 0 #c0392b; 
        }

        /* ปุ่มที่ 2: สีฟ้าเขียว */
        .btn-2 { 
            background-color: #4ecdc4; 
            box-shadow: 0 10px 0 #16a085; 
        }
        .btn-2:active { 
            top: 10px; 
            box-shadow: 0 0 0 #16a085; 
        }

        /* ปุ่มที่ 3: สีส้ม */
        .btn-3 { 
            background-color: #fca311; 
            box-shadow: 0 10px 0 #cc7a00; 
        }
        .btn-3:active { 
            top: 10px; 
            box-shadow: 0 0 0 #cc7a00; 
        }

        /* สำหรับมือถือ */
        @media (max-width: 600px) {
            h1 { font-size: 1.6em; }
            .btn-3d { font-size: 1.1em; width: 100%; }
            .dashboard-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="image-gallery">
            <img src="smt2025-banner.png" alt="โลโก้ SMT2025 จุฬาภรณ์" class="logo-img">
            <img src="owlvy_banner.jpg" alt="Owlvy แบนเนอร์ ท้าทายเด็ก Gifted">
        </div>

        <h1>ท้าทายเด็ก GIFTED<br>แบบทดสอบ จุฬาภรณ์ SMT2025 สไตล์ 3D</h1>

        <div class="button-group">
            <a href="smt2025-pretest2568-01-20questions.html" class="btn-3d btn-1">
                📝 ทำแบบทดสอบ ข้อ 1 - 20
            </a>
            
            <a href="smt2025-pretest2568-21-40questions.html" class="btn-3d btn-2">
                📝 ทำแบบทดสอบ ข้อ 21 - 40
            </a>
            
            <a href="smt2025-pretest2568-41-60questions.html" class="btn-3d btn-3">
                📝 ทำแบบทดสอบ ข้อ 41 - 60
            </a>
        </div>

    </div>

</body>
</html>
